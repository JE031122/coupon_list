name: update-coupon-list

on:
  schedule:
    - cron: "0 21 * * *"   # 毎日 21:00 UTC = 日本時間 朝6:00
  workflow_dispatch:        # 手動実行ボタンも使えるようにする

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6

      - name: Pythonを準備
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: ライブラリを入れる
        run: pip install requests

      - name: クーポン一覧を生成
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python update_coupons.py

      - name: 変更があれば保存（コミット）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "クーポン一覧を自動更新"
          git push
